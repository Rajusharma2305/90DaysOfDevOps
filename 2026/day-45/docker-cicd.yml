Task 3 – Push to Docker Hub

Production pipelines usually create multiple tags.

Why multiple tags?

Suppose today's commit is

1a2b3c4d5e6f

We create

latest

sha-1a2b3c4

Latest always points to newest image.

SHA always points to exact version.

Create Short SHA
- name: Set Short SHA
  run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

Suppose

GITHUB_SHA

=

9a123456789abcdef

Then

SHORT_SHA

=

9a12345

Stored inside

Environment Variable
Build and Push
- name: Build and Push
  uses: docker/build-push-action@v5
  with:
    context: .
    push: true
    tags: |
      ${{ secrets.DOCKER_USERNAME }}/myapp:latest
      ${{ secrets.DOCKER_USERNAME }}/myapp:sha-${{ env.SHORT_SHA }}

Now

Both images are uploaded

latest

sha-9a12345
Verify

Open Docker Hub.

You should see

Repositories

↓

myapp

↓

Tags
latest

sha-9a12345
Task 4 – Push Only on Main

Very common interview question.

You don't want feature branches pushing production images.

Use

if: github.ref == 'refs/heads/main'

Example

- name: Build and Push
  if: github.ref == 'refs/heads/main'
  uses: docker/build-push-action@v5
  with:
    push: true
Test

Create feature branch

git checkout -b feature/login

Commit

git add .
git commit -m "Testing"
git push origin feature/login

Workflow

Build ✔

Push ❌ Skipped

Exactly what companies do.

Complete Workflow
name: Docker Publish

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/myapp:latest
            ${{ secrets.DOCKER_USERNAME }}/myapp:sha-${{ env.SHORT_SHA }}
